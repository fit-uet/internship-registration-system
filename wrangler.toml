name = "internship-registration-system"
main = "src/worker.ts"
compatibility_date = "2026-05-15"
workers_dev = true
preview_urls = true

[vars]
CORS_ORIGIN = "https://fit-uet.github.io"
# Optional: set this after verifying a sender/domain in Resend.
# EMAIL_FROM = "FIT UET Internship <no-reply@example.edu.vn>"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "internship-final-reports"

[[d1_databases]]
binding = "DB"
database_name = "internship-registration-system-db"
# Copy the Database ID from Cloudflare Dashboard > Workers & Pages > D1 SQL Database.
# Keeping this in config prevents a new deploy from losing the DB binding.
database_id = "866e23b7-3b49-43e4-ab90-59dceb4c4f76"

# Set these as Cloudflare Worker secrets, not plain vars:
# wrangler secret put JWT_SECRET
# wrangler secret put VITE_GOOGLE_CLIENT_ID
# wrangler secret put ADMIN_EMAIL
# wrangler secret put GOOGLE_SERVICE_ACCOUNT_EMAIL
# wrangler secret put GOOGLE_PRIVATE_KEY
# wrangler secret put RESEND_API_KEY
